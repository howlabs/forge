# Forge Configuration File

[provider]
# Default provider: Z.AI with GLM 5.1
type = "zai"
model = "glm-5.1"
api_key_env = "ZAI_API_KEY"

# Alternative providers:
# type = "anthropic"
# model = "claude-sonnet-4-20250514"
# api_key_env = "FORGE_API_KEY"
#
# type = "openai"
# model = "gpt-4"
# api_key_env = "OPENAI_API_KEY"
#
# type = "gemini"
# model = "gemini-pro"
# api_key_env = "GEMINI_API_KEY"

[sandbox]
# Network mode: off, restricted, full
network = "off"
# Working directory
project_path = "."

[context]
# The context crate already implements tree-sitter indexing, a knowledge graph,
# and a local vector store (see context/src/), but the live event loop still
# loads AGENTS.md as the primary context source by default.
agents_file = "AGENTS.md"

[verify]
# Mandatory verify loop - always run before reporting done
enabled = true
# Run cargo test and cargo build
commands = ["cargo test", "cargo build"]

# External MCP stdio servers to connect before a run. Each entry launches the
# given command and exposes its tools to the agent. Forge can also act as a
# server: `forge mcp serve` speaks line-delimited JSON-RPC over stdio.
#
# [mcp.servers.forge-self]
# command = "forge"
# args = ["mcp", "serve", "--project-path", "."]

[logging]
level = "info"
