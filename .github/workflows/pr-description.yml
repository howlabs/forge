name: Forge PR Description

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  describe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Forge
        run: cargo build --release -p forge-cli

      - name: Get PR info
        id: info
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          BODY="${{ github.event.pull_request.body }}"
          BRANCH="${{ github.head_ref }}"
          BASE="${{ github.base_ref }}"

          CHANGED_FILES=$(git diff --name-only origin/$BASE...HEAD)
          COMMIT_LOG=$(git log --oneline origin/$BASE...HEAD)

          echo "title<<TITLE_EOF" >> $GITHUB_OUTPUT
          echo "$TITLE" >> $GITHUB_OUTPUT
          echo "TITLE_EOF" >> $GITHUB_OUTPUT

          echo "changed_files<<FILES_EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "FILES_EOF" >> $GITHUB_OUTPUT

          echo "commit_log<<LOG_EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_LOG" >> $GITHUB_OUTPUT
          echo "LOG_EOF" >> $GITHUB_OUTPUT

      - name: Generate PR Description
        env:
          FORGE_API_KEY: ${{ secrets.FORGE_API_KEY }}
        run: |
          cat <<PROMPT > /tmp/describe_prompt.md
          Generate a comprehensive PR description for this pull request.

          Branch: ${{ github.head_ref }} -> ${{ github.base_ref }}

          Commit history:
          ${{ steps.info.outputs.commit_log }}

          Changed files:
          ${{ steps.info.outputs.changed_files }}

          Format the description with:
          ## Summary
          Brief overview of changes

          ## Changes
          - List of specific changes made

          ## Testing
          How to test these changes

          ## Related Issues
          Link any related issues (use "Closes #NNN" format)
          PROMPT

          DESCRIPTION=$(./target/release/forge exec --prompt "$(cat /tmp/describe_prompt.md)" 2>&1 || echo "Description generation failed")

          echo "$DESCRIPTION" > /tmp/description.md

      - name: Update PR description
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const description = fs.readFileSync('/tmp/description.md', 'utf8');
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: description
            });
